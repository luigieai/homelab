# Meerkat CRM Docker Compose - All-in-one image
#
# Single-container with bundled frontend and backend (+ nginx)
#
# USAGE:
#   cp .env.example .env && edit .env, then:
#   docker compose up -d
#
# To build the image locally instead of pulling it:
#   uncomment the `build:` line below, then: docker compose up -d --build
services:
  meerkat:
    image: ghcr.io/fbuchner/meerkat-crm:${IMAGE_TAG:-latest}
    # build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${DATA_PATH:-./data}:/app/data
      - ${PHOTOS_PATH:-./photos}:/app/static/photos
    networks:
      - meerkat_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meerkat.rule=Host(`meerkat.lab.marioverde.com.br`)"
      - "traefik.http.routers.meerkat.entrypoints=websecure"
      - "traefik.http.routers.meerkat.tls.certresolver=cloudflare"
      - "traefik.http.services.meerkat.loadbalancer.server.port=8080"

networks:
  meerkat_network:
    driver: bridge
