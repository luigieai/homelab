###################################
# CONTAINER REGISTRY               #
###################################
## Official CNCF Distribution registry (https://distribution.github.io/distribution/)
## + Joxit UI for browsing images/tags.
## No auth for now — internal `.lab` domain only.

services:
  registry:
    image: registry:${REGISTRY_VERSION:-3.1.1}
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: "[https://registry-ui.lab.marioverde.com.br]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: "[HEAD,GET,OPTIONS,DELETE]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: "[Accept,Cache-Control]"
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: "[Docker-Content-Digest]"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - registry_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.registry.rule=Host(`registry.lab.marioverde.com.br`)"
      - "traefik.http.routers.registry.entrypoints=websecure"
      - "traefik.http.routers.registry.tls.certresolver=cloudflare"
      - "traefik.http.services.registry.loadbalancer.server.port=5000"

  registry-ui:
    image: joxit/docker-registry-ui:${REGISTRY_UI_VERSION:-2.6.0}
    restart: unless-stopped
    environment:
      REGISTRY_TITLE: "${REGISTRY_UI_TITLE:-Container Registry}"
      REGISTRY_URL: https://registry.lab.marioverde.com.br
      SINGLE_REGISTRY: "true"
      DELETE_IMAGES: "true"
    networks:
      - registry_network
    depends_on:
      - registry
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.registry-ui.rule=Host(`registry-ui.lab.marioverde.com.br`)"
      - "traefik.http.routers.registry-ui.entrypoints=websecure"
      - "traefik.http.routers.registry-ui.tls.certresolver=cloudflare"
      - "traefik.http.services.registry-ui.loadbalancer.server.port=80"

networks:
  registry_network:
    driver: bridge

volumes:
  registry_data:
