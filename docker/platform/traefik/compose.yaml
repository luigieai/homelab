###################################
# TRAEFIK - INGRESS               #
###################################
## Deploys Traefik v3.6 as the ingress controller
## with Let's Encrypt via Cloudflare DNS challenge

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      ## --- API / Dashboard ---
      - --api.dashboard=true
      - --api.insecure=false

      ## --- Providers ---
      - --providers.docker=true                      # Docker Compose mode
      - --providers.docker.exposedbydefault=false    # require explicit opt-in per service

      ## --- Entrypoints ---
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirect all HTTP → HTTPS globally
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true

      ## --- Let's Encrypt via Cloudflare DNS challenge ---
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json

      ## --- Logs ---
      - --log.level=INFO
      - --accesslog=true

    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
      ACME_EMAIL: ${ACME_EMAIL}

    network_mode: host                             # bind directly to host NIC on ports 80/443

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

    labels:
      ## --- Dashboard router ---
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.lab.marioverde.com.br`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.dashboard.service=api@internal"
      ## Dummy port required when using api@internal with Docker provider
      - "traefik.http.services.dashboard-dummy.loadbalancer.server.port=8080"

volumes:
  letsencrypt:
