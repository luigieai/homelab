###################################
# 🔀 TRAEFIK - SWARM INGRESS     #
###################################
## Deploys Traefik v3.6 as a global swarm ingress
## with Let's Encrypt via Cloudflare DNS challenge

services:
  traefik:
    image: traefik:v3.6
    command:
      ## --- API / Dashboard ---
      - --api.dashboard=true
      - --api.insecure=false

      ## --- Providers ---
      - --providers.swarm=true                          # Docker Swarm mode
      - --providers.swarm.exposedbydefault=false        # require explicit opt-in per service
      - --providers.swarm.network=traefik-public        # default overlay network

      ## --- Entrypoints ---
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirect all HTTP → HTTPS globally
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true

      ## --- Let's Encrypt via Cloudflare DNS challenge ---
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json

      ## --- Logs ---
      - --log.level=INFO
      - --accesslog=true

    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}   # Cloudflare API token

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host                             # bypass swarm LB, bind directly to host NIC
      - target: 443
        published: 443
        protocol: tcp
        mode: host

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

    networks:
      - traefik-public

    deploy:
      mode: global                             # one Traefik per swarm node
      placement:
        constraints:
          - node.role == manager               # only on manager nodes
      restart_policy:
        condition: on-failure
      labels:
        ## --- Dashboard router ---
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`traefik.lab.marioverde.com.br`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.tls.certresolver=cloudflare"
        - "traefik.http.routers.dashboard.service=api@internal"
        ## Dummy service required by Swarm for the dashboard
        - "traefik.http.services.dashboard-dummy.loadbalancer.server.port=8080"
        - "traefik.docker.network=traefik_traefik-public"

networks:
  traefik-public:
    driver: overlay
    attachable: true                           # allows non-swarm containers to attach if needed

volumes:
  letsencrypt: